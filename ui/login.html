<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concert Ticketing | Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">🎵 ConcertHub</div>
        <div class="nav-links">
            <a href="index.html">Browse Events</a>
        </div>
    </nav>

    <!-- LOGIN / REGISTER FORM -->
    <main class="container form-container">

        <!-- TAB TOGGLE -->
        <div class="tab-group">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- LOGIN PANEL -->
        <div id="panel-login" class="form-panel">
            <h2>Welcome Back</h2>
            <p class="form-subtitle">Enter your User ID to continue</p>

            <div class="form-group">
                <label for="login-id">User ID</label>
                <input type="text" id="login-id" placeholder="e.g. U001">
            </div>

            <div id="login-error" class="error-msg hidden">
                User not found. Please check your ID or register.
            </div>

            <button class="btn-primary full-width" onclick="handleLogin()">Login</button>
        </div>

        <!-- REGISTER PANEL -->
        <div id="panel-register" class="form-panel hidden">
            <h2>Create Account</h2>
            <p class="form-subtitle">Register as a fan or event manager</p>

            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="reg-role">Role</label>
                <select id="reg-role">
                    <option value="fan">Fan</option>
                    <option value="manager">Event Manager</option>
                </select>
            </div>

            <div id="register-error" class="error-msg hidden">
                Registration failed. Please try again.
            </div>
            <div id="register-success" class="success-msg hidden">
                Account created! Redirecting...
            </div>

            <button class="btn-primary full-width" onclick="handleRegister()">Create Account</button>
        </div>

    </main>

    <script src="js/api.js"></script>
    <script>

        // Switch between Login and Register tabs
        function switchTab(tab) {
            document.getElementById("panel-login").classList.toggle("hidden", tab !== "login");
            document.getElementById("panel-register").classList.toggle("hidden", tab !== "register");
            document.getElementById("tab-login").classList.toggle("active", tab === "login");
            document.getElementById("tab-register").classList.toggle("active", tab === "register");
        }

        // LOGIN — calls GET /user/userId
        async function handleLogin() {
            const userId = document.getElementById("login-id").value.trim();
            if (!userId) return;

            try {
                const data = await loginUser(userId);
                if (data && data.userId) {
                    // Save user to sessionStorage
                    sessionStorage.setItem("user", JSON.stringify(data));
                    // Redirect based on role
                    if (data.role === "manager") {
                        window.location.href = "manage-event.html";
                    } else {
                        window.location.href = "index.html";
                    }
                } else {
                    document.getElementById("login-error").classList.remove("hidden");
                }
            } catch (err) {
                document.getElementById("login-error").classList.remove("hidden");
            }
        }

        // REGISTER — calls POST /user/new
        async function handleRegister() {
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const role = document.getElementById("reg-role").value;

            if (!name || !email) return;

            try {
                const data = await registerUser({ name, email, role });
                if (data && data.userId) {
                    sessionStorage.setItem("user", JSON.stringify(data));
                    document.getElementById("register-success").classList.remove("hidden");
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                } else {
                    document.getElementById("register-error").classList.remove("hidden");
                }
            } catch (err) {
                document.getElementById("register-error").classList.remove("hidden");
            }
        }

    </script>

</body>
</html>
