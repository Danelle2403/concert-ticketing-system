<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concert Ticketing | Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">🎵 ConcertHub</div>
        <div class="nav-links">
            <a href="index.html">Browse Events</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="manage-event.html" id="nav-manage" class="hidden">Manage Events</a>
            <span id="nav-user" class="hidden"></span>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <h1>Find Your Next Concert</h1>
        <p>Browse upcoming events and grab your tickets</p>
    </section>

    <!-- EVENTS GRID -->
    <main class="container">
        <h2>Upcoming Events</h2>
        <div id="loading" class="loading-msg">Loading events...</div>
        <div id="events-grid" class="events-grid"></div>
        <div id="error-msg" class="error-msg hidden">
            Failed to load events. Please try again later.
        </div>
    </main>

    <!-- EVENT CARD TEMPLATE -->
    <template id="event-card-template">
        <div class="event-card">
            <div class="event-date"></div>
            <h3 class="event-name"></h3>
            <p class="event-venue"></p>
            <p class="event-price"></p>
            <button class="btn-primary buy-btn">Buy Tickets</button>
        </div>
    </template>

    <script src="js/api.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(sessionStorage.getItem("user"));
        if (user) {
            document.getElementById("nav-login").classList.add("hidden");
            document.getElementById("nav-user").classList.remove("hidden");
            document.getElementById("nav-user").textContent = `👤 ${user.name}`;
            if (user.role === "manager") {
                document.getElementById("nav-manage").classList.remove("hidden");
            }
        }

        // Load events on page load
        async function loadEvents() {
            try {
                const data = await getEvents();
                const grid = document.getElementById("events-grid");
                document.getElementById("loading").classList.add("hidden");

                if (!data.events || data.events.length === 0) {
                    grid.innerHTML = "<p>No upcoming events found.</p>";
                    return;
                }

                const template = document.getElementById("event-card-template");
                data.events.forEach(event => {
                    const card = template.content.cloneNode(true);
                    card.querySelector(".event-date").textContent = event.date || "TBC";
                    card.querySelector(".event-name").textContent = event.name;
                    card.querySelector(".event-venue").textContent = `📍 ${event.venue}`;
                    card.querySelector(".event-price").textContent = `From $${event.price}`;
                    card.querySelector(".buy-btn").addEventListener("click", () => {
                        // Store selected event and go to buy page
                        sessionStorage.setItem("selectedEvent", JSON.stringify(event));
                        window.location.href = "buy-ticket.html";
                    });
                    grid.appendChild(card);
                });

            } catch (err) {
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("error-msg").classList.remove("hidden");
            }
        }

        loadEvents();
    </script>

</body>
</html>
