version: "3.8"

services:

  # ── UI LAYER ────────────────────────────────────────────────
  ui:
    image: nginx:alpine
    volumes:
      - ./ui:/usr/share/nginx/html
    ports:
      - "8080:80"
    networks:
      - ticketing-net

  # ── KONG API GATEWAY ─────────────────────────────────────────
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong:/kong/declarative
    ports:
      - "8000:8000"   # API Gateway — your UI calls this
      - "8001:8001"   # Kong Admin API
    networks:
      - ticketing-net
    depends_on:
      - user-service
      - event-service
      - purchase-composite
      - refund-composite
      - edit-event-composite

  # ── USER SERVICE ─────────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=user-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=user_db
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── USER SERVICE DATABASE ────────────────────────────────────
  user-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=user_db
    volumes:
      - user-db-data:/var/lib/mysql
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── SEAT INVENTORY SERVICE ────────────────────────────────────
  seat-inventory:
    build: ./seat-inventory
    ports:
      - "5004:5000"
    environment:
      - DB_HOST=seat-inventory-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=seat_inventory_db
      - DEFAULT_HOLD_TTL_SECONDS=300
      - MAX_HOLD_TTL_SECONDS=1800
    depends_on:
      seat-inventory-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── SEAT INVENTORY DATABASE ───────────────────────────────────
  seat-inventory-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=seat_inventory_db
    volumes:
      - seat-inventory-db-data:/var/lib/mysql
      - ./seat-inventory/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── EVENT SERVICE ────────────────────────────────────────────
  event-service:
    build: ./event-service
    ports:
      - "5003:5000"
    environment:
      - DB_HOST=event-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=event_db
    depends_on:
      event-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── EVENT SERVICE DATABASE ───────────────────────────────────
  event-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=event_db
    volumes:
      - event-db-data:/var/lib/mysql
      - ./event-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── PURCHASE COMPOSITE ──────────────────────────────────────
  purchase-composite:
    build: ./purchase-composite
    ports:
      - "5010:5000"
    environment:
      - USER_SERVICE_URL=http://user-service:5000
      - EVENT_SERVICE_URL=http://event-service:5000
      - SEAT_INVENTORY_URL=http://seat-inventory:5000
      - TICKET_SERVICE_URL=https://ticketatomic-production.up.railway.app
      - PURCHASE_DB_PATH=/data/purchase.db
    volumes:
      - purchase-data:/data
    depends_on:
      - user-service
      - event-service
      - seat-inventory
    networks:
      - ticketing-net

  # ── REFUND COMPOSITE ────────────────────────────────────────
  refund-composite:
    build: ./refund-composite
    ports:
      - "5011:5000"
    environment:
      - USER_SERVICE_URL=http://user-service:5000
      - PURCHASE_SERVICE_URL=http://purchase-composite:5000
      - SEAT_INVENTORY_URL=http://seat-inventory:5000
    depends_on:
      - user-service
      - purchase-composite
      - seat-inventory
    networks:
      - ticketing-net

  # ── EDIT EVENT COMPOSITE ────────────────────────────────────
  edit-event-composite:
    build: ./edit-event-composite
    ports:
      - "5012:5000"
    environment:
      - EVENT_SERVICE_URL=http://event-service:5000
      - USER_SERVICE_URL=http://user-service:5000
      - REFUND_SERVICE_URL=http://refund-composite:5000
    depends_on:
      - event-service
      - user-service
      - refund-composite
    networks:
      - ticketing-net

  # ── RABBITMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── GROUPMATES ADD THEIR SERVICES BELOW ─────────────────────
  # ticket-service:
  #   build: ./ticket-service
  #   ports:
  #     - "5002:5000"
  #   networks:
  #     - ticketing-net

  # event-service:
  #   build: ./event-service
  #   ports:
  #     - "5003:5000"
  #   networks:
  #     - ticketing-net

  # seat-inventory-service:
  #   build: ./seat-inventory-service
  #   ports:
  #     - "5004:5000"
  #   networks:
  #     - ticketing-net

  # purchase-composite:
  #   build: ./purchase-composite
  #   ports:
  #     - "5010:5000"
  #   networks:
  #     - ticketing-net

  # refund-composite:
  #   build: ./refund-composite
  #   ports:
  #     - "5011:5000"
  #   networks:
  #     - ticketing-net

  # edit-event-composite:
  #   build: ./edit-event-composite
  #   ports:
  #     - "5012:5000"
  #   networks:
  #     - ticketing-net

# ── VOLUMES ───────────────────────────────────────────────────
volumes:
  user-db-data:
  seat-inventory-db-data:
  event-db-data:
  purchase-data:

# ── NETWORKS ──────────────────────────────────────────────────
networks:
  ticketing-net:
    driver: bridge
