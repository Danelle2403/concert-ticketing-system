services:
  # ── UI LAYER ────────────────────────────────────────────────
  ui:
    image: nginx:alpine
    volumes:
      - ./ui:/usr/share/nginx/html
    ports:
      - "8080:80"
    networks:
      - ticketing-net

  # ── MESSAGE BROKER ──────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ticketing-net

  # ── USER SERVICE DATABASE ───────────────────────────────────
  user-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=user_db
    volumes:
      - user-db-data:/var/lib/mysql
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - ticketing-net

  # ── USER SERVICE ────────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=user-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=user_db
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── EVENT SERVICE DATABASE ──────────────────────────────────
  event-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=event_db
    volumes:
      - event-db-data:/var/lib/mysql
      - ./event-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - ticketing-net

  # ── EVENT SERVICE ───────────────────────────────────────────
  event-service:
    build: ./event-service
    ports:
      - "5003:5000"
    environment:
      - DB_HOST=event-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=event_db
    depends_on:
      event-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── SEAT INVENTORY DATABASE ─────────────────────────────────
  seat-inventory-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=seat_inventory_db
    volumes:
      - seat-inventory-db-data:/var/lib/mysql
      - ./seat-inventory/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - ticketing-net

  # ── SEAT INVENTORY SERVICE ──────────────────────────────────
  seat-inventory:
    build: ./seat-inventory
    ports:
      - "5004:5000"
    environment:
      - DB_HOST=seat-inventory-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=seat_inventory_db
      - DEFAULT_HOLD_TTL_SECONDS=300
      - MAX_HOLD_TTL_SECONDS=1800
    depends_on:
      seat-inventory-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── TICKET SERVICE (LOCAL REPLACEMENT FOR RAILWAY) ─────────
  ticket-service:
    build: ./ticket-service
    ports:
      - "5002:5000"
    environment:
      - TICKET_DB_PATH=/data/tickets.db
    volumes:
      - ticket-data:/data
    networks:
      - ticketing-net

  # ── PURCHASE COMPOSITE ──────────────────────────────────────
  purchase-composite:
    build: ./purchase-composite
    ports:
      - "5010:5000"
    environment:
      - USER_SERVICE_URL=http://user-service:5000
      - EVENT_SERVICE_URL=http://event-service:5000
      - SEAT_INVENTORY_URL=http://seat-inventory:5000
      - TICKET_SERVICE_URL=http://ticket-service:5000
      - PURCHASE_DB_PATH=/data/purchase.db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
    volumes:
      - purchase-data:/data
    depends_on:
      user-service:
        condition: service_started
      event-service:
        condition: service_started
      seat-inventory:
        condition: service_started
      ticket-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── REFUND COMPOSITE ────────────────────────────────────────
  refund-composite:
    build: ./refund-composite
    ports:
      - "5011:5000"
    environment:
      - USER_SERVICE_URL=http://user-service:5000
      - PURCHASE_SERVICE_URL=http://purchase-composite:5000
      - SEAT_INVENTORY_URL=http://seat-inventory:5000
      - TICKET_SERVICE_URL=http://ticket-service:5000
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
      - REFUND_RESPONSE_QUEUE=refund.response.q
    depends_on:
      user-service:
        condition: service_started
      purchase-composite:
        condition: service_started
      seat-inventory:
        condition: service_started
      ticket-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── EDIT EVENT COMPOSITE ────────────────────────────────────
  edit-event-composite:
    build: ./edit-event-composite
    ports:
      - "5012:5000"
    environment:
      - EVENT_SERVICE_URL=http://event-service:5000
      - USER_SERVICE_URL=http://user-service:5000
      - REFUND_SERVICE_URL=http://refund-composite:5000
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
    depends_on:
      event-service:
        condition: service_started
      user-service:
        condition: service_started
      refund-composite:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── PAYMENT WRAPPER (ASYNC REFUND PROCESSOR) ───────────────
  payment-wrapper:
    build: ./payment-wrapper
    ports:
      - "5014:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
      - DLX_EXCHANGE=ticketing.dlx
      - REFUND_REQUEST_QUEUE=refund.request.q
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── DEAD LETTER CONSUMER ────────────────────────────────────
  dead-letter-consumer:
    build: ./dead-letter-consumer
    ports:
      - "5015:5000"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
      - DLX_EXCHANGE=ticketing.dlx
      - REFUND_DLQ=refund.request.dlq
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── NOTIFICATION WRAPPER ────────────────────────────────────
  notification-service:
    build: ./notification-service
    ports:
      - "5013:5000"
    environment:
      - NOTIFICATION_DB_PATH=/data/notifications.db
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - EVENT_EXCHANGE=ticketing.events
      - NOTIFICATION_QUEUE=notification.queue
    volumes:
      - notification-data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── KONG API GATEWAY ────────────────────────────────────────
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong:/kong/declarative
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      user-service:
        condition: service_started
      event-service:
        condition: service_started
      ticket-service:
        condition: service_started
      purchase-composite:
        condition: service_started
      refund-composite:
        condition: service_started
      edit-event-composite:
        condition: service_started
    networks:
      - ticketing-net

volumes:
  user-db-data:
  event-db-data:
  seat-inventory-db-data:
  purchase-data:
  ticket-data:
  notification-data:

networks:
  ticketing-net:
    driver: bridge
