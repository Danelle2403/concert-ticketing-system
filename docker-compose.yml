version: "3.8"

services:

  # ── UI LAYER ────────────────────────────────────────────────
  ui:
    image: nginx:alpine
    volumes:
      - ./ui:/usr/share/nginx/html
    ports:
      - "8080:80"
    networks:
      - ticketing-net

  # ── KONG API GATEWAY ─────────────────────────────────────────
  kong:
    image: kong:3.4
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    volumes:
      - ./kong:/kong/declarative
    ports:
      - "8000:8000"   # API Gateway — your UI calls this
      - "8001:8001"   # Kong Admin API
    networks:
      - ticketing-net
    depends_on:
      - user-service

  # ── USER SERVICE ─────────────────────────────────────────────
  user-service:
    build: ./user-service
    ports:
      - "5001:5000"
    environment:
      - DB_HOST=user-db
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=user_db
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - ticketing-net

  # ── USER SERVICE DATABASE ────────────────────────────────────
  user-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=user_db
    volumes:
      - user-db-data:/var/lib/mysql
      - ./user-service/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── RABBITMQ ─────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketing-net

  # ── GROUPMATES ADD THEIR SERVICES BELOW ─────────────────────
