version: "3.8"

services:
  event-service:
    build: .
    ports:
      - "5002:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://event_user:event_password@event-db:5432/event_service_db
      CORS_ORIGIN: "*"
    depends_on:
      event-db:
        condition: service_healthy

  event-db:
    image: postgres:16-alpine
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: event_service_db
      POSTGRES_USER: event_user
      POSTGRES_PASSWORD: event_password
    volumes:
      - event-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event_user -d event_service_db"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  event-db-data:
